<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Skies mark: adaptive sky-gradient tile (SVG, light/dark via prefers-color-scheme),
         with favicon.ico as the fallback for browsers that don't support SVG favicons. -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <!-- Preload the fonts -->
    <link rel="preload" href="/src/fonts/JetBrains_Mono/JetBrainsMono-Variable.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="/src/fonts/Source_Serif_4/SourceSerif4-Variable.woff2" as="font" type="font/woff2" crossorigin="anonymous" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1b7be4" />
    <meta name="description" content="Notebook" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <script data-marimo="true">
      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>
    <marimo-filename hidden>{{ filename }}</marimo-filename>
    <!-- TODO(Trevor): Legacy, required by VS Code plugin. Remove when plugin is updated (see marimo/server/_templates/template.py) -->
    <marimo-version data-version="{{ version }}" hidden></marimo-version>
    <marimo-user-config data-config="{{ user_config }}" hidden></marimo-user-config>
    <marimo-server-token data-token="{{ server_token }}" hidden></marimo-server-token>
    <!-- /TODO -->
    <!-- Apply the resolved theme to <html> BEFORE first paint. ThemeProvider
         only adds the theme class after React mounts, so without this the
         first paint — and the inter-document gap during notebook switches —
         renders with the wrong (light) color-scheme: a bright flash in dark
         mode. Mirrors the resolution order in src/theme/useTheme.ts:
         ?theme= query param > saved display.theme > system preference. -->
    <script data-marimo="true">
      (function () {
        try {
          var theme = new URLSearchParams(window.location.search).get("theme");
          if (theme !== "light" && theme !== "dark" && theme !== "system") {
            theme = null;
            var configEl = document.querySelector("marimo-user-config");
            if (configEl) {
              var config = JSON.parse(configEl.getAttribute("data-config") || "{}");
              var saved = config.display && config.display.theme;
              if (saved === "light" || saved === "dark" || saved === "system") {
                theme = saved;
              }
            }
          }
          var resolved = theme;
          if (resolved !== "light" && resolved !== "dark") {
            resolved =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          }
          var root = document.documentElement;
          root.classList.add(resolved, resolved + "-theme");
          root.dataset.theme = resolved;
          // Pre-CSS bridge: this script runs BEFORE the stylesheet links
          // below are fetched, so set a literal canvas color inline. Without
          // it, an early first paint of the new document (before the CSS
          // bundle arrives) flashes default white. ThemeProvider clears this
          // once React boots; globals.css then drives the canvas from
          // --background so live theme changes keep working.
          root.style.backgroundColor =
            resolved === "dark" ? "#15131d" : "#faf7f7";
        } catch (error) {
          // Never block first paint on theme bootstrapping; React applies
          // the theme after mount regardless.
        }
      })();
    </script>
    <title>{{ title }}</title>
  </head>
  <body>
    <div id="root"></div>
    <script data-marimo="true">
      Object.defineProperty(window, "__MARIMO_MOUNT_CONFIG__", {
        value: Object.freeze('{{ mount_config }}'),
        writable: false,
        configurable: false,
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
