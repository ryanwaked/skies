# Skies (customized marimo) for zimaOS / Docker Compose.
#
# Option A — build the image once, then reference it:
#     NODE_ENV=production ./scripts/buildfrontend.sh
#     docker build -f docker/Dockerfile.skies -t skies:latest .
#     docker compose -f docker/docker-compose.skies.yml up -d
#
# Option B — let compose build it (uncomment `build:` and remove `image:`).
#   Note the build context is the repo root ("..") because this file lives in
#   docker/. marimo/_static must still be pre-built (see scripts/buildfrontend.sh).
services:
  skies:
    image: skies:latest
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile.skies
    container_name: skies
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Your notebooks live here. Use a bind mount (e.g. /DATA/AppData/skies:/data
      # on zimaOS) if you want them on the host filesystem instead of a volume.
      - skies-data:/data
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
    # marimo has no external services to wait on; a simple TCP check is enough.
    healthcheck:
      test: ["CMD", "python", "-c", "import socket,os; s=socket.create_connection(('127.0.0.1', int(os.environ['PORT'])), 5); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  skies-data:
